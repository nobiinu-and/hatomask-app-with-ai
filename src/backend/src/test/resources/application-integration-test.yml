# 統合テスト用の設定
# Testcontainersを使用して実際のPostgreSQLコンテナでテストを実行します
spring:
  application:
    name: hatomask-backend-integration-test
  
  # データソース設定は AbstractIntegrationTest で動的に設定されます
  datasource:
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      # Flywayでマイグレーション管理するため、validateに設定
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # Flywayを有効化して、実際のマイグレーションスクリプトをテスト
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# ログレベル
logging:
  level:
    com.hatomask: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.testcontainers: INFO
